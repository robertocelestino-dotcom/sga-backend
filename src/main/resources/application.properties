# ============================================================
# SERVER CONFIGURATION
# ============================================================
server.port=8080
server.servlet.context-path=/api
server.servlet.multipart.enabled=true
server.servlet.multipart.file-size-threshold=2KB
server.servlet.multipart.location=${java.io.tmpdir}
server.connection-timeout=60000
spring.mvc.async.request-timeout=600000

# ============================================================
# APPLICATION NAME
# ============================================================
spring.application.name=sistema-gestao-associados

# ============================================================
# DATABASE CONFIGURATION
# ============================================================
spring.datasource.url=jdbc:postgresql://10.109.1.4:5432/cdlfor
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# ============================================================
# CONNECTION POOL CONFIGURATION (OTIMIZADO)
# ============================================================
spring.datasource.hikari.maximum-pool-size=30
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.leak-detection-threshold=60000
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.pool-name=SgaHikariPool

# ============================================================
# JPA CONFIGURATION (OTIMIZADO)
# ============================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# BATCH PROCESSING - OTIMIZAÇĂO DE INSERÇŐES
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true

# CACHE E PERFORMANCE
spring.jpa.properties.hibernate.query.in_clause_parameter_padding=true
spring.jpa.properties.hibernate.cache.use_query_cache=true
spring.jpa.properties.hibernate.cache.use_second_level_cache=false

# TIMEOUTS
spring.jpa.properties.javax.persistence.query.timeout=60000
spring.jpa.properties.hibernate.jdbc.timeout=30

# ESTATÍSTICAS (ATIVAR PARA DEBUG, DEPOIS DESATIVAR)
spring.jpa.properties.hibernate.generate_statistics=true
spring.jpa.properties.hibernate.use_sql_comments=false

# ============================================================
# SECURITY JWT CONFIGURATION
# ============================================================
app.jwt.secret=413F4428472B4B6250655368566D5970337336763979244226452948404D6351
app.jwt.expiration=86400000

# ============================================================
# FILE UPLOAD CONFIGURATION
# ============================================================
app.file.upload-dir=./uploads
app.file.spc-input-dir=./uploads/spc
app.file.totvs-output-dir=./exports/totvs

# ============================================================
# LOGGING (AJUSTADO PARA PERFORMANCE)
# ============================================================
logging.level.com.sga=INFO
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=OFF
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=OFF
logging.level.org.springframework.web=INFO
logging.level.com.sga.aop=INFO
logging.level.com.sga.service.SistemaLogService=INFO

# LOG DE PERFORMANCE (ATIVAR PARA DEBUG)
logging.level.com.zaxxer.hikari=INFO
logging.level.org.hibernate.stat=INFO

# ============================================================
# MULTIPART FILE UPLOAD
# ============================================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
spring.servlet.multipart.file-size-threshold=2KB

# ============================================================
# SPRING CORE
# ============================================================
spring.main.allow-circular-references=true
spring.main.allow-bean-definition-overriding=true

# ============================================================
# CORS CONFIGURATION
# ============================================================
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000,http://127.0.0.1:5173,http://127.0.0.1:3000

# ============================================================
# CACHE CONFIGURATION
# ============================================================
spring.cache.type=simple
spring.cache.cache-names=verificacaoCache

# ============================================================
# TASK EXECUTION (PARALELISMO)
# ============================================================
spring.task.execution.pool.core-size=10
spring.task.execution.pool.max-size=50
spring.task.execution.pool.queue-capacity=1000
spring.task.execution.thread-name-prefix=faturamento-

# ============================================================
# THYMELEAF CONFIGURATION
# ============================================================
spring.thymeleaf.prefix=file:./src/main/resources/templates/
spring.thymeleaf.check-template-location=true
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.cache=false
spring.thymeleaf.servlet.content-type=text/html

# ============================================================
# JACKSON CONFIGURATION
# ============================================================
spring.jackson.serialization.FAIL_ON_EMPTY_BEANS=false
spring.jackson.serialization.WRITE_DATES_AS_TIMESTAMPS=false
spring.jackson.time-zone=America/Sao_Paulo
spring.jackson.default-property-inclusion=NON_NULL

# ============================================================
# NOTIFICACAO DATABASE (MS-SQL Server)
# ============================================================
# Configuraçăo via código Java (năo via properties)
# ============================================================

# ============================================================
# SCHEDULER CONFIGURATION
# ============================================================
notificacao.scheduler.cron=0 30 1 * * ?
notificacao.scheduler.dias-retrospectiva=30
